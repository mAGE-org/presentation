<!DOCTYPE html>
<html>
<head>
<style>
html { background: #1F4E5F; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1F4E5F;
  font-family: 'Helvetica', 'Arial', sans-serif;
  color: #FFFFFF;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.inner {
  width: 620pt;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30pt 0;
}
.badge {
  color: #E76F51;
  font-size: 11pt;
  font-weight: bold;
  letter-spacing: 4pt;
  margin: 0 0 26pt 0;
}
.vision1 {
  color: #FFFFFF;
  font-size: 40pt;
  font-weight: bold;
  font-family: 'Georgia', serif;
  margin: 0 0 4pt 0;
  line-height: 1.3;
  text-align: center;
}
.vision2 {
  color: #FFFFFF;
  font-size: 40pt;
  font-weight: bold;
  font-family: 'Georgia', serif;
  margin: 0 0 24pt 0;
  line-height: 1.3;
  text-align: center;
}
.vision-accent {
  color: #F4A261;
}
.accent-line {
  width: 80pt;
  height: 4pt;
  background: #E76F51;
  margin: 8pt 0 22pt 0;
  border: 0;
}
.closing-msg {
  color: #FAF7F2;
  font-size: 14pt;
  margin: 0 0 6pt 0;
  line-height: 1.7;
  text-align: center;
  opacity: 0.92;
}
.product-tag {
  color: #F4A261;
  font-size: 13pt;
  font-weight: bold;
  letter-spacing: 3pt;
  margin: 32pt 0 0 0;
}
</style>
</head>
<body>
<div class="inner">
  <p class="badge">OUR VISION</p>
  <p class="vision1">半径5mの <span class="vision-accent">外</span> に、</p>
  <p class="vision2">あなたのキャリアがある。</p>
  <hr class="accent-line"/>
  <p class="closing-msg">社内にすでに存在する、"まだ見ぬロールモデル"との出会いをAIが繋ぐ。</p>
  <p class="closing-msg">個人はいきいきと、組織は自律的に。会社と人のキャリアを、同じ方向に揃える。</p>
  <p class="product-tag">INNER COMPASS</p>
</div>
</body>
</html>
