<!DOCTYPE html>
<html>
<head>
<style>
html { background: #FAF7F2; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #FAF7F2;
  font-family: 'Helvetica', 'Arial', sans-serif;
  display: flex;
  color: #1C2833;
}
.left-block {
  width: 260pt; height: 405pt;
  background: #1F4E5F;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 36pt 28pt;
  box-sizing: border-box;
}
.badge {
  color: #E76F51;
  font-size: 11pt;
  font-weight: bold;
  letter-spacing: 3pt;
  margin: 0 0 14pt 0;
}
.product-name {
  color: #FFFFFF;
  font-size: 28pt;
  font-weight: bold;
  margin: 0;
  line-height: 1.2;
  font-family: 'Georgia', serif;
}
.product-sub {
  color: #AAB7B8;
  font-size: 12pt;
  margin: 14pt 0 0 0;
  line-height: 1.5;
}
.accent-line {
  width: 50pt; height: 4pt;
  background: #E76F51;
  margin: 24pt 0 0 0;
  border: 0;
}
.meta {
  color: #FAF7F2;
  font-size: 10pt;
  margin: 0;
  line-height: 1.6;
  opacity: 0.7;
}
.right-block {
  flex: 1;
  padding: 54pt 48pt;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-sizing: border-box;
}
.small-hook {
  color: #5D6D7E;
  font-size: 12pt;
  letter-spacing: 2pt;
  margin: 0 0 18pt 0;
  font-weight: bold;
}
.hook-line1 {
  color: #1C2833;
  font-size: 32pt;
  font-weight: bold;
  margin: 0 0 6pt 0;
  line-height: 1.35;
  font-family: 'Georgia', serif;
}
.hook-line2 {
  color: #1C2833;
  font-size: 32pt;
  font-weight: bold;
  margin: 0 0 6pt 0;
  line-height: 1.35;
  font-family: 'Georgia', serif;
}
.hook-accent {
  color: #E76F51;
}
.hook-sub {
  color: #5D6D7E;
  font-size: 13pt;
  margin: 26pt 0 0 0;
  line-height: 1.7;
}
</style>
</head>
<body>
<div class="left-block">
  <div>
    <p class="badge">CAREER × AI AGENT</p>
    <p class="product-name">Inner Compass</p>
    <p class="product-sub">社内ロールモデル発見型キャリアAIエージェント</p>
    <hr class="accent-line"/>
  </div>
  <div>
    <p class="meta">Google AI Agent Hackathon</p>
    <p class="meta">2026 / Team Submission</p>
  </div>
</div>
<div class="right-block">
  <p class="small-hook">QUESTION TO YOU</p>
  <p class="hook-line1">あなたのキャリアの選択肢、</p>
  <p class="hook-line2"><span class="hook-accent">"半径5m"</span>で決めていませんか？</p>
  <p class="hook-sub">大企業のなかに埋もれている "まだ見ぬ自分のキャリア" を、</p>
  <p class="hook-sub" style="margin-top: 0;">AIエージェントが引き出す。</p>
</div>
</body>
</html>
