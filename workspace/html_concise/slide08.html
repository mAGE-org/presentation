<!DOCTYPE html><html><head><style>
html{background:#fff}body{width:720pt;height:405pt;margin:0;padding:0;font-family:Arial,sans-serif;display:flex;flex-direction:column;background:#FFFFFF}
</style></head><body>
<div style="background:#1B2A4A;padding:20pt 40pt"><h2 style="color:#fff;font-size:24pt;margin:0">アーキテクチャ</h2></div>
<div style="flex:1;display:flex;flex-direction:column;gap:10pt;margin:20pt 50pt 24pt 50pt;justify-content:center">
  <div style="display:flex;gap:10pt">
    <div style="width:110pt;background:#1B2A4A;border-radius:6pt;padding:10pt;display:flex;align-items:center"><p style="color:#fff;font-size:11pt;font-weight:bold;margin:0">ユーザー接点</p></div>
    <div style="flex:1;display:flex;gap:8pt">
      <div style="flex:1;background:#EDF2F7;border-radius:6pt;padding:10pt;text-align:center"><p style="color:#1B2A4A;font-size:11pt;font-weight:bold;margin:0">Slack / Teams</p></div>
    </div>
  </div>
  <div style="display:flex;gap:10pt">
    <div style="width:110pt;background:#00A99D;border-radius:6pt;padding:10pt;display:flex;align-items:center"><p style="color:#fff;font-size:11pt;font-weight:bold;margin:0">AIエージェント</p></div>
    <div style="flex:1;display:flex;gap:8pt">
      <div style="flex:1;background:#E6FFFA;border-radius:6pt;padding:10pt;text-align:center;border:1pt solid #00A99D"><p style="color:#1B2A4A;font-size:10pt;margin:0">壁打ち</p></div>
      <div style="flex:1;background:#E6FFFA;border-radius:6pt;padding:10pt;text-align:center;border:1pt solid #00A99D"><p style="color:#1B2A4A;font-size:10pt;margin:0">励まし</p></div>
      <div style="flex:1;background:#E6FFFA;border-radius:6pt;padding:10pt;text-align:center;border:1pt solid #00A99D"><p style="color:#1B2A4A;font-size:10pt;margin:0">マッチング</p></div>
    </div>
  </div>
  <div style="display:flex;gap:10pt">
    <div style="width:110pt;background:#2B6CB0;border-radius:6pt;padding:10pt;display:flex;align-items:center"><p style="color:#fff;font-size:11pt;font-weight:bold;margin:0">データ / RAG</p></div>
    <div style="flex:1;display:flex;gap:8pt">
      <div style="flex:1;background:#EBF4FF;border-radius:6pt;padding:10pt;text-align:center;border:1pt solid #2B6CB0"><p style="color:#1B2A4A;font-size:10pt;margin:0">インタビュー</p></div>
      <div style="flex:1;background:#EBF4FF;border-radius:6pt;padding:10pt;text-align:center;border:1pt solid #2B6CB0"><p style="color:#1B2A4A;font-size:10pt;margin:0">公募・スキル</p></div>
      <div style="flex:1;background:#EBF4FF;border-radius:6pt;padding:10pt;text-align:center;border:1pt solid #2B6CB0"><p style="color:#1B2A4A;font-size:10pt;margin:0">キャリアマップ</p></div>
    </div>
  </div>
  <div style="display:flex;gap:10pt">
    <div style="width:110pt;background:#718096;border-radius:6pt;padding:10pt;display:flex;align-items:center"><p style="color:#fff;font-size:11pt;font-weight:bold;margin:0">社内連携</p></div>
    <div style="flex:1;background:#EDF2F7;border-radius:6pt;padding:10pt;text-align:center;border:1pt dashed #718096"><p style="color:#4A5568;font-size:10pt;margin:0">既存キャリアシステム / 人事システム（将来拡張）</p></div>
  </div>
</div>
</body></html>
