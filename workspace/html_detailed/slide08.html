<!DOCTYPE html><html><head><style>
html{background:#fff}body{width:720pt;height:405pt;margin:0;padding:0;font-family:Arial,sans-serif;display:flex;flex-direction:column;background:#FFFFFF}
</style></head><body>
<div style="background:#1B2A4A;padding:18pt 40pt"><h2 style="color:#fff;font-size:22pt;margin:0">独自性 ― なぜ Career Nexus でなければならないか</h2></div>
<div style="flex:1;display:flex;gap:14pt;margin:20pt 40pt 24pt 40pt">
  <div style="flex:1;background:#EDF2F7;border-radius:8pt;padding:18pt;border-top:4pt solid #00A99D;display:flex;flex-direction:column">
    <p style="color:#00A99D;font-size:32pt;font-weight:bold;margin:0">01</p>
    <p style="color:#1B2A4A;font-size:13pt;font-weight:bold;margin:8pt 0 8pt 0">自社データ x AI</p>
    <p style="color:#4A5568;font-size:10pt;margin:0;line-height:1.6">インタビュー記事・スキルデータ・公募情報をRAGで取り込み。汎用キャリアアドバイスではなく、その会社ならではのキャリア提案が可能</p>
  </div>
  <div style="flex:1;background:#EDF2F7;border-radius:8pt;padding:18pt;border-top:4pt solid #2B6CB0;display:flex;flex-direction:column">
    <p style="color:#2B6CB0;font-size:32pt;font-weight:bold;margin:0">02</p>
    <p style="color:#1B2A4A;font-size:13pt;font-weight:bold;margin:8pt 0 8pt 0">対話で深掘り</p>
    <p style="color:#4A5568;font-size:10pt;margin:0;line-height:1.6">AIとの会話で悩みや志向を深掘りし、一般的なアンケートでは得られない深い理解に基づく個人最適化されたプランを提示</p>
  </div>
  <div style="flex:1;background:#EDF2F7;border-radius:8pt;padding:18pt;border-top:4pt solid #E8734A;display:flex;flex-direction:column">
    <p style="color:#E8734A;font-size:32pt;font-weight:bold;margin:0">03</p>
    <p style="color:#1B2A4A;font-size:13pt;font-weight:bold;margin:8pt 0 8pt 0">蓄積が組織価値に</p>
    <p style="color:#4A5568;font-size:10pt;margin:0;line-height:1.6">個人の会話蓄積で従来得られない詳細情報が溜まり、人員配置最適化・メンタリングマッチング等の新ユースケースが生まれる</p>
  </div>
</div>
</body></html>
