<!DOCTYPE html><html><head><style>
html{background:#fff}body{width:720pt;height:405pt;margin:0;padding:0;font-family:Arial,sans-serif;display:flex;flex-direction:column;background:#FFFFFF}
</style></head><body>
<div style="background:#1B2A4A;padding:18pt 40pt"><h2 style="color:#fff;font-size:22pt;margin:0">課題提起 ― 大企業なのに"自分の周りしか見えない"問題</h2></div>
<div style="flex:1;display:flex;flex-direction:column;margin:20pt 40pt 20pt 40pt">
  <p style="color:#1B2A4A;font-size:14pt;font-weight:bold;margin:0 0 14pt 0">同僚が転職していく、そのリアルな理由</p>
  <div style="display:flex;gap:12pt;margin-bottom:16pt">
    <div style="flex:1;background:#EDF2F7;border-radius:6pt;border-left:4pt solid #00A99D;padding:10pt 12pt">
      <p style="color:#1B2A4A;font-size:11pt;font-weight:bold;margin:0 0 4pt 0">ロールモデルがいない</p>
      <p style="color:#4A5568;font-size:9pt;margin:0">直属の上司・先輩の将来が自分の将来に見えてしまう</p>
    </div>
    <div style="flex:1;background:#EDF2F7;border-radius:6pt;border-left:4pt solid #2B6CB0;padding:10pt 12pt">
      <p style="color:#1B2A4A;font-size:11pt;font-weight:bold;margin:0 0 4pt 0">やりたいことと違う</p>
      <p style="color:#4A5568;font-size:9pt;margin:0">でも社内に他の選択肢があることを知らない</p>
    </div>
  </div>
  <div style="display:flex;gap:12pt;margin-bottom:16pt">
    <div style="flex:1;background:#EDF2F7;border-radius:6pt;border-left:4pt solid #E8734A;padding:10pt 12pt">
      <p style="color:#1B2A4A;font-size:11pt;font-weight:bold;margin:0 0 4pt 0">部署の外が見えない</p>
      <p style="color:#4A5568;font-size:9pt;margin:0">大企業なのに、知っている社員はほんの一握り</p>
    </div>
    <div style="flex:1;background:#EDF2F7;border-radius:6pt;border-left:4pt solid #9F7AEA;padding:10pt 12pt">
      <p style="color:#1B2A4A;font-size:11pt;font-weight:bold;margin:0 0 4pt 0">異動が期待と違った</p>
      <p style="color:#4A5568;font-size:9pt;margin:0">異動先の風土・同僚・業務を事前に知る手段がない</p>
    </div>
  </div>
  <div style="background:#1B2A4A;border-radius:6pt;padding:14pt 18pt">
    <p style="color:#00A99D;font-size:13pt;font-weight:bold;margin:0">辞める人の多くは「会社が嫌い」なのではなく、「この会社での可能性が見えない」から辞めている</p>
  </div>
</div>
</body></html>
